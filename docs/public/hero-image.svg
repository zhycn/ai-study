<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.08" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.04" />
    </linearGradient>

    <!-- Node gradients - multiple colors -->
    <radialGradient id="n1" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </radialGradient>
    <radialGradient id="n2" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </radialGradient>
    <radialGradient id="n3" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </radialGradient>
    <radialGradient id="n4" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </radialGradient>
    <radialGradient id="n5" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </radialGradient>
    <radialGradient id="n6" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Connection gradient -->
    <linearGradient id="conn1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="conn2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="conn3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#ec4899" stroke-width="0.5" opacity="0.1"/>

  <!-- Central glow -->
  <circle cx="200" cy="200" r="60" fill="#6366f1" opacity="0.08" filter="url(#softGlow)"/>

  <!-- Neural network connections -->
  <g stroke-width="1.5" opacity="0.4">
    <!-- Layer 1 to Layer 2 -->
    <line x1="100" y1="120" x2="180" y2="80" stroke="url(#conn1)"/>
    <line x1="100" y1="120" x2="180" y2="140" stroke="url(#conn1)"/>
    <line x1="100" y1="120" x2="180" y2="200" stroke="url(#conn1)"/>
    <line x1="100" y1="180" x2="180" y2="80" stroke="url(#conn1)"/>
    <line x1="100" y1="180" x2="180" y2="140" stroke="url(#conn1)"/>
    <line x1="100" y1="180" x2="180" y2="200" stroke="url(#conn1)"/>
    <line x1="100" y1="240" x2="180" y2="80" stroke="url(#conn1)"/>
    <line x1="100" y1="240" x2="180" y2="140" stroke="url(#conn1)"/>
    <line x1="100" y1="240" x2="180" y2="200" stroke="url(#conn1)"/>
    <line x1="100" y1="300" x2="180" y2="80" stroke="url(#conn1)"/>
    <line x1="100" y1="300" x2="180" y2="140" stroke="url(#conn1)"/>
    <line x1="100" y1="300" x2="180" y2="200" stroke="url(#conn1)"/>

    <!-- Layer 2 to Layer 3 -->
    <line x1="180" y1="80" x2="260" y2="100" stroke="url(#conn2)"/>
    <line x1="180" y1="80" x2="260" y2="160" stroke="url(#conn2)"/>
    <line x1="180" y1="140" x2="260" y2="100" stroke="url(#conn2)"/>
    <line x1="180" y1="140" x2="260" y2="160" stroke="url(#conn2)"/>
    <line x1="180" y1="200" x2="260" y2="100" stroke="url(#conn2)"/>
    <line x1="180" y1="200" x2="260" y2="160" stroke="url(#conn2)"/>
    <line x1="180" y1="260" x2="260" y2="100" stroke="url(#conn2)"/>
    <line x1="180" y1="260" x2="260" y2="160" stroke="url(#conn2)"/>

    <!-- Layer 3 to Layer 4 -->
    <line x1="260" y1="100" x2="320" y2="140" stroke="url(#conn3)"/>
    <line x1="260" y1="100" x2="320" y2="200" stroke="url(#conn3)"/>
    <line x1="260" y1="160" x2="320" y2="140" stroke="url(#conn3)"/>
    <line x1="260" y1="160" x2="320" y2="200" stroke="url(#conn3)"/>

    <!-- Layer 4 to Output -->
    <line x1="320" y1="140" x2="350" y2="180" stroke="url(#conn1)"/>
    <line x1="320" y1="200" x2="350" y2="180" stroke="url(#conn1)"/>
  </g>

  <!-- Nodes - Layer 1 (Input) -->
  <g filter="url(#glow)">
    <circle cx="100" cy="120" r="10" fill="url(#n1)"/>
    <circle cx="100" cy="180" r="10" fill="url(#n4)"/>
    <circle cx="100" cy="240" r="10" fill="url(#n5)"/>
    <circle cx="100" cy="300" r="10" fill="url(#n6)"/>
  </g>

  <!-- Nodes - Layer 2 (Hidden) -->
  <g filter="url(#glow)">
    <circle cx="180" cy="80" r="12" fill="url(#n2)"/>
    <circle cx="180" cy="140" r="12" fill="url(#n3)"/>
    <circle cx="180" cy="200" r="12" fill="url(#n1)"/>
    <circle cx="180" cy="260" r="12" fill="url(#n4)"/>
  </g>

  <!-- Nodes - Layer 3 (Hidden) -->
  <g filter="url(#glow)">
    <circle cx="260" cy="100" r="11" fill="url(#n3)"/>
    <circle cx="260" cy="160" r="11" fill="url(#n2)"/>
  </g>

  <!-- Nodes - Layer 4 (Hidden) -->
  <g filter="url(#glow)">
    <circle cx="320" cy="140" r="10" fill="url(#n5)"/>
    <circle cx="320" cy="200" r="10" fill="url(#n6)"/>
  </g>

  <!-- Output Node -->
  <g filter="url(#glow)">
    <circle cx="350" cy="180" r="14" fill="url(#n1)"/>
    <circle cx="350" cy="180" r="8" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Floating particles -->
  <circle cx="140" cy="60" r="4" fill="#60a5fa" opacity="0.6"/>
  <circle cx="220" cy="50" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="300" cy="70" r="3.5" fill="#f472b6" opacity="0.5"/>
  <circle cx="80" cy="340" r="3" fill="#34d399" opacity="0.6"/>
  <circle cx="160" cy="350" r="4" fill="#fbbf24" opacity="0.5"/>
  <circle cx="280" cy="330" r="3" fill="#f87171" opacity="0.5"/>
  <circle cx="340" cy="280" r="3.5" fill="#60a5fa" opacity="0.6"/>
  <circle cx="60" cy="200" r="2.5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="380" cy="120" r="2" fill="#f472b6" opacity="0.5"/>

  <!-- Sparkle effects -->
  <path d="M 150 90 L 152 95 L 157 97 L 152 99 L 150 104 L 148 99 L 143 97 L 148 95 Z" fill="#fbbf24" opacity="0.7"/>
  <path d="M 280 280 L 282 285 L 287 287 L 282 289 L 280 294 L 278 289 L 273 287 L 278 285 Z" fill="#34d399" opacity="0.7"/>
  <path d="M 200 320 L 202 325 L 207 327 L 202 329 L 200 334 L 198 329 L 193 327 L 198 325 Z" fill="#f472b6" opacity="0.7"/>

  <!-- AI Text watermark -->
  <text x="200" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="56" fill="#6366f1" opacity="0.08">AI</text>
</svg>
